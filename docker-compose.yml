services:
  django:
    build: ./services/django
    ports:
      - 8000:8000
    networks:
      - backend_net
    # volumes:
    env_file:
      - .env
    depends_on:
      - postgresql
    restart: unless-stopped

  postgresql:
    image: postgres:15
    # build: ./services/postgresql
    networks:
      - backend_net
    volumes:
      - postgres_vol:/var/lib/postgresql/data/
    env_file:
      - .env
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    networks:
      - backend_net
    volumes:
      - prometheus_vol:/etc/prometheus
      - "./rules.yml:/etc/prometheus/rules.yml"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  # node-exporter:
  #   image: prom/node-exporter
  #   networks:
  #     - backend_net
  #   ports:
  #     - 9100:9100

  alertmanager:
    image: prom/alertmanager
    ports:
      - 9093:9093
    volumes:
      - alertmanager_vol:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - backend_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
     - 3000:3000
    volumes:
      - grafana_vol:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_vol:
  grafana_vol:
  prometheus_vol:
  alertmanager_vol:

networks:
  backend_net:
