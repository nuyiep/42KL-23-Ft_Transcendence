version: '3'

services:
  backend:
    build: ./backend
    ports:
      - 3000:3000
    networks:
      - backend_net
    # volumes:
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - 8080:8080
    networks:
      - backend_net
    # volumes:
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:

networks:
  backend_net:
